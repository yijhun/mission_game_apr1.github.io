<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臥底問卷產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 640px; margin: 0 auto; padding: 24px 16px 56px; }
.header { text-align: center; margin-bottom: 28px; }
.header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.header p { font-size: 13px; color: #888; }
.card { background: white; border-radius: 14px; padding: 18px; margin-bottom: 14px; border: 1px solid #e8e7e3; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
input[type=text], textarea { border: 1.5px solid #e8e7e3; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; }
input[type=text] { flex: 1; }
input[type=text]:focus, textarea:focus { border-color: #1D9E75; }
.btn { border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; cursor: pointer; font-weight: 500; transition: all .15s; }
.btn-primary { background: #1D9E75; color: white; }
.btn-primary:hover { background: #0F6E56; }
.btn-secondary { background: #f0efe9; color: #444; }
.btn-secondary:hover { background: #e0dfd9; }
.btn-full { width: 100%; padding: 13px; font-size: 15px; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.btn-icon { width: 28px; height: 28px; border-radius: 50%; border: none; background: #f5f4f0; color: #aaa; cursor: pointer; font-size: 14px; flex-shrink: 0; }
.btn-icon:hover { background: #fce9e9; color: #c0392b; }
.member-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #f5f4f0; }
.member-item:last-child { border-bottom: none; }
.member-name { flex: 1; font-size: 14px; font-weight: 500; }
.pastor-chip { font-size: 10px; background: #FAEEDA; color: #854F0B; padding: 2px 7px; border-radius: 20px; }
.btn-toggle { font-size: 11px; padding: 5px 11px; border-radius: 6px; border: 1.5px solid #e8e7e3; background: white; cursor: pointer; color: #666; white-space: nowrap; }
.btn-toggle.on { border-color: #BA7517; background: #FAEEDA; color: #854F0B; }
.empty-hint { text-align: center; padding: 28px 16px; color: #aaa; font-size: 13px; }
.empty-hint .icon { font-size: 28px; margin-bottom: 8px; }
.warning { background: #FAEEDA; border-radius: 8px; padding: 9px 13px; font-size: 12px; color: #854F0B; margin-bottom: 10px; line-height: 1.6; display: none; }
.name-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
.name-tab { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #e8e7e3; font-size: 13px; cursor: pointer; background: white; color: #444; transition: all .15s; }
.name-tab:hover { border-color: #1D9E75; }
.name-tab.active { background: #1D9E75; border-color: #1D9E75; color: white; }
.name-tab.is-pastor { border-color: #EF9F27; }
.name-tab.is-pastor.active { background: #BA7517; border-color: #BA7517; }
.score-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #f5f4f0; }
.score-row:last-child { border-bottom: none; }
.sg { color: #1D9E75; font-weight: 600; }
.sa { color: #BA7517; font-weight: 600; }
.sr { color: #c0392b; font-weight: 600; }
.hint { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.7; }
.actions { display: flex; gap: 8px; margin-top: 14px; }
.actions .btn { flex: 1; }

/* QR Card */
.qr-card { background: white; border-radius: 14px; border: 1px solid #e8e7e3; padding: 20px; margin-bottom: 14px; }
.qr-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.qr-sub { font-size: 12px; color: #888; margin-bottom: 18px; }
.qr-box { display: flex; justify-content: center; margin-bottom: 14px; }
.qr-box canvas, .qr-box img { border-radius: 8px; }
.qr-note { font-size: 12px; color: #888; text-align: center; line-height: 1.7; margin-bottom: 14px; }
.copy-btn { width: 100%; padding: 11px; border: 1.5px solid #e8e7e3; border-radius: 10px; background: #f5f4f0; font-size: 13px; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .2s; }
.copy-btn:hover { background: #ebe9e3; }
.copy-btn.done { background: #E1F5EE; border-color: #9FE1CB; color: #0F6E56; }
.seed-info { background: #E1F5EE; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #0F6E56; margin-bottom: 14px; line-height: 1.6; }
.toggle-btn { width: 100%; padding: 12px; margin: 10px 0 0; border: 1.5px dashed #e8e7e3; border-radius: 10px; background: #fafaf8; font-size: 13px; cursor: pointer; color: #888; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .2s; }
.toggle-btn:hover { background: #f0efe9; border-color: #ccc; color: #555; }
.toggle-btn.open { background: #FAEEDA; border-color: #FAC775; color: #854F0B; }
.mission-text-area { display: none; margin-top: 12px; }
.mission-text-area.open { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.tb { border-radius: 10px; padding: 13px; margin-bottom: 10px; border: 1px solid; }
.tb:last-of-type { margin-bottom: 0; }
.tb-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.tb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.tb-name { font-size: 15px; font-weight: 600; flex: 1; }
.tb-pts { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.q-row { display: flex; gap: 9px; margin-bottom: 7px; font-size: 13px; line-height: 1.6; align-items: flex-start; }
.q-row:last-of-type { margin-bottom: 8px; }
.q-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
.faith-mark { font-size: 10px; opacity: 0.65; }
.ban { font-size: 11px; padding: 5px 9px; border-radius: 6px; line-height: 1.6; }
.ban-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin: 1px; }
.section-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0 12px; }
.sd-line { flex: 1; height: 1px; background: #f0efe9; }
.sd-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #bbb; white-space: nowrap; }
.mc-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.mc-title { font-size: 15px; font-weight: 600; }
.mc-sub { font-size: 12px; color: #888; margin-top: 2px; }
.mc-seal { font-size: 11px; background: #fce8c3; color: #854F0B; padding: 4px 10px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
.tb-teal { background: #f0fdf7; border-color: #9FE1CB; }
.tb-teal .tb-label { color: #1D9E75; } .tb-teal .tb-name { color: #085041; }
.tb-teal .q-dot { background: #1D9E75; } .tb-teal .tb-pts { background: #E1F5EE; color: #0F6E56; }
.tb-teal .ban { background: #d4f0e6; color: #0F6E56; } .tb-teal .ban-tag { background: #9FE1CB; color: #04342C; }
.tb-purple { background: #f5f4ff; border-color: #CECBF6; }
.tb-purple .tb-label { color: #7F77DD; } .tb-purple .tb-name { color: #26215C; }
.tb-purple .q-dot { background: #7F77DD; } .tb-purple .tb-pts { background: #EEEDFE; color: #534AB7; }
.tb-purple .ban { background: #e0defb; color: #534AB7; } .tb-purple .ban-tag { background: #CECBF6; color: #26215C; }
.tb-blue { background: #f0f7ff; border-color: #B5D4F4; }
.tb-blue .tb-label { color: #378ADD; } .tb-blue .tb-name { color: #042C53; }
.tb-blue .q-dot { background: #378ADD; } .tb-blue .tb-pts { background: #E6F1FB; color: #185FA5; }
.tb-blue .ban { background: #d0e8f9; color: #185FA5; } .tb-blue .ban-tag { background: #B5D4F4; color: #042C53; }
.tb-amber { background: #fffbf0; border-color: #FAC775; }
.tb-amber .tb-label { color: #BA7517; } .tb-amber .tb-name { color: #412402; }
.tb-amber .q-dot { background: #EF9F27; } .tb-amber .tb-pts { background: #FAEEDA; color: #854F0B; }
.tb-amber .ban { background: #fce8c3; color: #854F0B; } .tb-amber .ban-tag { background: #FAC775; color: #412402; }
.verse-send { background: #f0fdf7; border: 1.5px solid #5DCAA5; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
.vs-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.vs-icon { font-size: 17px; }
.vs-title { font-size: 13px; font-weight: 600; color: #085041; flex: 1; }
.vs-pts { font-size: 10px; background: #E1F5EE; color: #0F6E56; padding: 3px 9px; border-radius: 20px; }
.vs-target { font-size: 13px; color: #1D9E75; margin-bottom: 10px; }
.vs-target strong { font-size: 15px; color: #085041; }
.verse-box { background: white; border: 1px solid #9FE1CB; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.verse-quote { font-size: 14px; line-height: 1.8; color: #1a1a1a; font-style: italic; margin-bottom: 4px; }
.verse-ref { font-size: 12px; color: #1D9E75; font-weight: 500; }
.vs-rule { font-size: 12px; color: #1D9E75; line-height: 1.6; padding-top: 10px; border-top: 1px solid #9FE1CB; }
.verse-recv { background: #f5f4ff; border: 1.5px solid #CECBF6; border-radius: 12px; padding: 14px 16px; }
.vr-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.vr-icon { font-size: 17px; }
.vr-title { font-size: 13px; font-weight: 600; color: #26215C; }
.vr-pts { font-size: 10px; background: #EEEDFE; color: #534AB7; padding: 3px 9px; border-radius: 20px; margin-left: auto; }
.vr-body { font-size: 13px; color: #534AB7; line-height: 1.7; }
.vr-body strong { font-size: 15px; color: #26215C; }
.vr-rule { font-size: 12px; color: #7F77DD; margin-top: 8px; padding-top: 8px; border-top: 1px solid #CECBF6; line-height: 1.6; }

/* ── 手機任務顯示模式 ── */
.phone-wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 48px; }
.phone-header { text-align: center; padding: 28px 0 20px; border-bottom: 1px solid #e8e7e3; margin-bottom: 20px; }
.phone-icon { font-size: 36px; margin-bottom: 8px; }
.phone-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.phone-sub { font-size: 13px; color: #888; }
.phone-section { margin-bottom: 20px; }
.phone-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.phone-sec-title::after { content:''; flex:1; height:1px; background:#e8e7e3; }
.phone-target { background: white; border-radius: 12px; border: 1px solid #e8e7e3; padding: 14px; margin-bottom: 10px; }
.phone-target-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.phone-target-num { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.phone-target-name { font-size: 16px; font-weight: 700; flex: 1; }
.phone-target-pts { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.phone-q { font-size: 14px; line-height: 1.7; padding: 8px 0; border-bottom: 1px solid #f5f4f0; color: #333; display: flex; gap: 8px; }
.phone-q:last-of-type { border-bottom: none; padding-bottom: 0; }
.phone-q-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
.phone-ban { font-size: 11px; margin-top: 8px; padding: 6px 10px; border-radius: 6px; line-height: 1.6; }
.phone-ban b { margin-right: 4px; }
/* target colors */
.pt-teal { border-color: #9FE1CB; }
.pt-teal .phone-target-num { color: #1D9E75; }
.pt-teal .phone-target-name { color: #085041; }
.pt-teal .phone-target-pts { background:#E1F5EE; color:#0F6E56; }
.pt-teal .phone-q-dot { background: #1D9E75; }
.pt-teal .phone-ban { background: #d4f0e6; color: #0F6E56; }
.pt-purple { border-color: #CECBF6; }
.pt-purple .phone-target-num { color: #7F77DD; }
.pt-purple .phone-target-name { color: #26215C; }
.pt-purple .phone-target-pts { background:#EEEDFE; color:#534AB7; }
.pt-purple .phone-q-dot { background: #7F77DD; }
.pt-purple .phone-ban { background: #e0defb; color: #534AB7; }
.pt-blue { border-color: #B5D4F4; }
.pt-blue .phone-target-num { color: #378ADD; }
.pt-blue .phone-target-name { color: #042C53; }
.pt-blue .phone-target-pts { background:#E6F1FB; color:#185FA5; }
.pt-blue .phone-q-dot { background: #378ADD; }
.pt-blue .phone-ban { background: #d0e8f9; color: #185FA5; }
.pt-amber { border-color: #FAC775; }
.pt-amber .phone-target-num { color: #BA7517; }
.pt-amber .phone-target-name { color: #412402; }
.pt-amber .phone-target-pts { background:#FAEEDA; color:#854F0B; }
.pt-amber .phone-q-dot { background: #EF9F27; }
.pt-amber .phone-ban { background: #fce8c3; color: #854F0B; }
.phone-verse-send { background: #f0fdf7; border: 1.5px solid #5DCAA5; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.pvs-label { font-size: 11px; font-weight: 700; color: #1D9E75; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.pvs-target { font-size: 13px; color: #1D9E75; margin-bottom: 10px; }
.pvs-target b { font-size: 16px; color: #085041; }
.pvs-quote { font-style: italic; font-size: 15px; line-height: 1.8; color: #1a1a1a; margin-bottom: 4px; background: white; border: 1px solid #9FE1CB; border-radius: 8px; padding: 12px 14px; }
.pvs-ref { font-size: 12px; color: #1D9E75; font-weight: 600; margin-bottom: 10px; padding-left: 2px; }
.pvs-rule { font-size: 12px; color: #1D9E75; line-height: 1.6; padding-top: 10px; border-top: 1px solid #9FE1CB; }
.phone-verse-recv { background: #f5f4ff; border: 1.5px solid #CECBF6; border-radius: 12px; padding: 14px; }
.pvr-label { font-size: 11px; font-weight: 700; color: #7F77DD; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.pvr-sender { font-size: 15px; font-weight: 700; color: #26215C; margin-bottom: 6px; }
.pvr-body { font-size: 13px; color: #534AB7; line-height: 1.7; }
.pvr-rule { font-size: 12px; color: #7F77DD; margin-top: 8px; padding-top: 8px; border-top: 1px solid #CECBF6; line-height: 1.6; }
.phone-footer { text-align: center; padding: 24px 0 8px; font-size: 12px; color: #ccc; }
.phone-seal { display: inline-block; background: #FAEEDA; color: #854F0B; font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 20px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- ── 主控端 HTML（手機模式時由 JS 隱藏） ── -->
<div id="admin-ui">
  <div class="container">
    <div class="header">
      <h1>🕵️ 臥底問卷產生器</h1>
      <p>十八尖山長老教會學生團契</p>
    </div>
    <div id="step1">
      <div class="card">
        <div class="card-title">成員名單</div>
        <div class="input-row">
          <input type="text" id="name-input" placeholder="輸入名字，按 Enter 新增" maxlength="10">
          <button class="btn btn-primary" onclick="addMember()">新增</button>
        </div>
        <div id="member-list"><div class="empty-hint"><div class="icon">👥</div>先新增成員</div></div>
      </div>
      <div id="gen-area" style="display:none">
        <div class="warning" id="warn-msg"></div>
        <div class="input-row">
          <input type="text" id="seed-input" placeholder="活動密鑰（如 20260401）留空則隨機">
        </div>
        <button class="btn btn-primary btn-full" onclick="generate()">✨ 生成每人的任務卡與 QR Code</button>
      </div>
      <div class="card" style="margin-top:14px;">
        <div class="card-title">計分方式</div>
        <div class="score-row"><span>🕵️ 成功套出一筆資訊</span><span class="sg">+2 分</span></div>
        <div class="score-row"><span>🕵️ 套出牧師資訊 ★</span><span class="sa">+3 分</span></div>
        <div class="score-row"><span>🕵️ 抓到別人套自己</span><span class="sg">+1 分</span></div>
        <div class="score-row"><span>🕵️ 全清所有臥底目標</span><span class="sa">+2 獎勵</span></div>
        <div class="score-row"><span>🕵️ 被成功套到（每題）</span><span class="sr">–1 分</span></div>
        <div class="score-row"><span>📖 對方察覺你傳的經節</span><span class="sg">+3 分</span></div>
        <div class="score-row"><span>📖 察覺對方傳來的經節</span><span class="sg">+2 分</span></div>
        <div class="hint">💡 每人有兩個任務：臥底套話 ＋ 傳遞聖經經節。掃描 QR Code 即可在手機上看到完整任務卡。</div>
      </div>
    </div>
    <div id="step2" style="display:none">
      <div class="card">
        <div style="font-size:13px;color:#888;margin-bottom:10px;">選擇成員，讓對方掃 QR Code</div>
        <div class="name-tabs" id="name-tabs"></div>
      </div>
      <div id="card-display"></div>
      <div class="actions">
        <button class="btn btn-secondary" onclick="goBack()">← 重新設定</button>
        <button class="btn btn-secondary" onclick="regen()">🔀 重新生成</button>
      </div>
    </div>
  </div>
</div>

<!-- 手機模式時動態填入 -->
<div id="phone-ui" style="display:none"></div>

<script>
// ── 資料 ──────────────────────────────────────────────────────────────
const LQ = [
  {q:'有什麼很少人知道的興趣或技能',ban:'你有什麼興趣？'},
  {q:'最近在學或嘗試的一件新事物',ban:'你最近在學什麼？'},
  {q:'曾經去過讓自己印象最深的一個地方',ban:'你去過最遠哪裡？'},
  {q:'從小到大一直保持的一個生活習慣',ban:'你有什麼老習慣？'},
  {q:'有沒有什麼讓人意外的人生經歷或選擇',ban:'你做過什麼特別決定？'},
  {q:'最近最期待的一件事，不管大小',ban:'你在期待什麼？'},
  {q:'有什麼奇怪的恐懼或特別怕的東西',ban:'你最怕什麼？'},
  {q:'有什麼連家人也不太了解的夢想或計劃',ban:'你有什麼夢想？'},
  {q:'有一種食物幾乎每週都吃、少了會難受',ban:'你最喜歡吃什麼？'},
  {q:'最近讓自己很有感觸的一本書或一部片',ban:'你最近看什麼？'},
  {q:'平常什麼時候最有活力、最像自己',ban:'你是晨型人嗎？'},
  {q:'如果明天突然多一天假，會做什麼',ban:'你放假喜歡做什麼？'},
  {q:'有沒有一件一直想做但還沒做的事',ban:'你有什麼遺憾？'},
  {q:'覺得自己最像哪一種動物，以及理由',ban:'你像什麼動物？'},
  {q:'最近改變或正在培養的一個新習慣',ban:'你最近有什麼改變？'},
  {q:'加入團契之前是個什麼樣的人',ban:'你以前是什麼個性？'},
];
const FQ = [
  {q:'曾經因為信仰改變過的一個重要決定',ban:'信仰有影響你的決定嗎？'},
  {q:'最近讓自己感謝神的一件小事',ban:'你最近感謝神什麼？'},
  {q:'最喜歡的聖經人物，以及為什麼是他/她',ban:'你喜歡哪個聖經人物？'},
  {q:'有沒有曾經感受到神帶領的印象深刻時刻',ban:'你有感受過神帶領嗎？'},

// ── 種子亂數 ──────────────────────────────────────────────────────────
let seededRandom = Math.random;
function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function setSeed(val) {
  if (!val) { seededRandom = Math.random; return; }
  let hash = 0;
  for (let i = 0; i < val.length; i++) { hash = ((hash << 5) - hash) + val.charCodeAt(i); hash |= 0; }
  seededRandom = mulberry32(hash);
}
const shuffle = a => {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(seededRandom() * (i+1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
};
function pickFrom(bank, used, count) {
  return shuffle(bank.map((q,i)=>({q,i})).filter(x=>!used.includes(x.i))).slice(0, count);
}

// ── 核心計算（主控端 & 手機端共用） ──────────────────────────────────
function buildMissions(members) {
  const pastor = members.find(m => m.isPastor);
  const others = members.filter(m => !m.isPastor);
  const used = {}; members.forEach(m => { used[m.id] = {l:[],f:[],p:[]}; });
  const tc = {}; members.forEach(m => { tc[m.id] = 0; });
  const asgn = {}; members.forEach(m => { asgn[m.id] = []; });
  if (pastor) {
    others.forEach(m => { asgn[m.id].push(pastor.id); tc[pastor.id]++; });
    shuffle(others).slice(0, Math.min(3, others.length)).forEach(t => { asgn[pastor.id].push(t.id); tc[t.id]++; });
  }
  for (const person of members) {
    const need = pastor ? (person.isPastor ? 3 : 2) : 3;
    const pool = members.filter(m => m.id !== person.id && !asgn[person.id].includes(m.id)).sort((a,b) => tc[a.id]-tc[b.id]);
    pool.slice(0, need - asgn[person.id].length).forEach(t => { asgn[person.id].push(t.id); tc[t.id]++; });
  }
  const NC = ['teal','purple','blue'];
  const result = {};
  for (const person of members) {
    let ci = 0;
    result[person.id] = asgn[person.id].map(tid => {
      const target = members.find(m => m.id === tid);
      const isPastor = target.isPastor;
      const u = used[tid];
      let q1, q2;
      if (isPastor) {
        const pp = pickFrom(PQ, u.p, 1)[0], fp = pickFrom(FQ, u.f, 1)[0];
        q1 = pp ? {...pp.q} : null; q2 = fp ? {...fp.q} : null;
        if (pp) u.p.push(pp.i); if (fp) u.f.push(fp.i);
      } else {
        const lp = pickFrom(LQ, u.l, 1)[0], fp = pickFrom(FQ, u.f, 1)[0];
        q1 = lp ? {...lp.q} : null; q2 = fp ? {...fp.q} : null;
        if (lp) u.l.push(lp.i); if (fp) u.f.push(fp.i);
      }
      return { target, isPastor, q1, q2, color: isPastor ? 'amber' : NC[ci++ % NC.length] };
    });
  }
  return result;
}

function buildVerses(members) {
  const shuffled = shuffle([...members]);
  const usedV = [], verseOut = {}, verseIn = {};
  shuffled.forEach((member, i) => {
    const target = shuffled[(i+1) % shuffled.length];
    const avail = VERSES.map((v,vi) => ({v,vi})).filter(x => !usedV.includes(x.vi));
    const pick = shuffle(avail)[0] || {v: VERSES[i % VERSES.length], vi: i % VERSES.length};
    usedV.push(pick.vi);
    verseOut[member.id] = { verse: pick.v.text, ref: pick.v.ref, targetId: target.id };
    verseIn[target.id] = member.id;
  });
  return { verseOut, verseIn };
}

      });
    } catch(e) {
      box.innerHTML = `<div style="color:#c0392b;padding:20px;text-align:center;font-size:13px;">QR Code 產生失敗，請改用複製連結功能</div>`;
    }
  }

  function copyURL(id) {
    const url = makeURL(id);
    const btn = document.getElementById('copy-url-btn');
    const ok = () => { btn.textContent = '✓ 已複製連結！'; btn.classList.add('done'); setTimeout(() => { btn.textContent = '🔗 複製任務連結（傳 LINE 也可以）'; btn.classList.remove('done'); }, 2200); };
    if (navigator.clipboard) { navigator.clipboard.writeText(url).then(ok).catch(() => fb(url, ok)); } else { fb(url, ok); }
  }
  window.copyURL = copyURL;

  function fb(txt, cb) {
    const ta = document.createElement('textarea'); ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
  }
}
</script>
</body>
</html>
